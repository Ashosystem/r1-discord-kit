<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=240, initial-scale=1.0, user-scalable=no">
<title>r1-discord</title>
<style>
:root {
  --bg:      #0e0e0e;
  --surface: #1a1a1a;
  --border:  #2a2a2a;
  --text:    #e0e0e0;
  --dim:     #888888;
  --accent:  #4a9eff;
  --own-msg: #2a4a8f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 240px; height: 282px;
  overflow: hidden;
  background: var(--bg); color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 13px;
  touch-action: manipulation;
}
#app {
  position: absolute;
  width: 240px; height: 282px;
  top: 0; left: 0;
  transition: transform 0.25s ease;
}
#app.landscape {
  width: 282px; height: 240px;
  top: 21px; left: -21px;
  transform: rotate(-90deg);
  transform-origin: center;
}
.screen { position: absolute; inset: 0; display: none; flex-direction: column; overflow: hidden; }
.screen.active { display: flex; }

.header {
  flex-shrink: 0;
  height: 36px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 10px;
  gap: 8px;
}
.header-title {
  font-weight: 700; font-size: 13px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  flex: 1;
}
.back-btn {
  background: none; border: none; color: var(--accent);
  font-size: 20px; cursor: pointer; padding: 0 2px; line-height: 1;
  flex-shrink: 0;
}

.scroll-area { flex: 1; overflow-y: auto; overflow-x: hidden; }
.scroll-area::-webkit-scrollbar { width: 3px; }
.scroll-area::-webkit-scrollbar-thumb { background: var(--border); }
body.in-landscape .scroll-area,
body.in-landscape #message-list { overflow: hidden; touch-action: none; }
body.in-landscape #compose-history { display: none; }

/* Guild list */
.guild-item {
  display: flex;
  align-items: center;
  padding: 8px 10px;
  cursor: pointer;
  gap: 10px;
  border-bottom: 1px solid var(--border);
}
.guild-item.selected { background: var(--surface); }
.guild-icon {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--border);
  flex-shrink: 0;
  object-fit: cover;
}
.guild-icon-placeholder {
  width: 36px; height: 36px; border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; color: #fff;
}
.guild-name {
  font-size: 12px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.category-header {
  padding: 6px 10px 2px;
  font-size: 10px; font-weight: 700;
  color: var(--dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.channel-item {
  padding: 6px 10px;
  cursor: pointer;
  font-size: 12px;
  color: var(--dim);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  display: flex; align-items: center; justify-content: space-between;
}
.channel-item-name::before { content: '# '; }
.channel-item.selected { background: var(--surface); color: var(--accent); }
.unread-dot {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--accent); flex-shrink: 0; margin-left: 4px;
}

#message-list {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 6px 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
#message-list::-webkit-scrollbar { width: 3px; }
#message-list::-webkit-scrollbar-thumb { background: var(--border); }

.msg-row {
  display: flex; align-items: flex-end; gap: 5px;
}
.msg-row.own { flex-direction: row-reverse; }
.msg-row.grouped { padding-left: 29px; }
.msg-row.own.grouped { padding-left: 0; padding-right: 0; }

.msg-avatar {
  width: 24px; height: 24px; border-radius: 50%;
  flex-shrink: 0; object-fit: cover;
  background: var(--border);
  align-self: flex-end;
}
.msg-avatar-placeholder {
  width: 24px; height: 24px; border-radius: 50%;
  flex-shrink: 0; background: var(--accent);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700; color: #fff;
  align-self: flex-end;
}

.message-bubble {
  max-width: 78%; padding: 5px 8px; border-radius: 10px;
  background: var(--surface); align-self: flex-start;
  word-break: break-word; font-size: 12px; line-height: 1.4;
}
.message-bubble.own { align-self: flex-end; background: var(--own-msg); }
.message-bubble.has-photo { max-width: 96%; }
.message-author { font-size: 10px; font-weight: 700; color: var(--accent); margin-bottom: 2px; }
.message-time   { font-size: 9px;  color: var(--dim); text-align: right; margin-top: 2px; }
.message-bubble.mention { background: rgba(74,158,255,0.18); border-left: 2px solid var(--accent); }
.message-bubble.own.mention { border-left: none; border-right: 2px solid var(--accent); }

.msg-reply {
  font-size: 10px; color: var(--dim);
  border-left: 2px solid var(--dim);
  padding: 2px 5px; margin-bottom: 3px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.msg-reply-author { color: var(--accent); font-weight: 700; margin-right: 4px; }

.msg-reactions { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 3px; }
.msg-reaction {
  display: flex; align-items: center; gap: 2px;
  background: var(--border); border-radius: 8px;
  padding: 1px 5px; font-size: 10px; color: var(--text);
}

.system-msg {
  text-align: center; font-size: 10px; color: var(--dim);
  padding: 2px 8px; font-style: italic;
}

#new-msg-banner {
  position: absolute;
  bottom: 44px; left: 50%;
  transform: translateX(-50%);
  background: var(--accent); color: #fff;
  padding: 4px 12px; border-radius: 12px;
  font-size: 11px; font-weight: 700;
  cursor: pointer; z-index: 30;
  display: none;
  white-space: nowrap;
}

#reply-bar {
  flex-shrink: 0;
  display: none;
  align-items: center;
  padding: 4px 8px;
  background: var(--surface);
  border-top: 1px solid var(--border);
  gap: 6px;
  font-size: 10px; color: var(--dim);
}
#reply-bar.active { display: flex; }
#reply-bar-text { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
#reply-bar-text strong { color: var(--accent); }
#reply-cancel {
  background: none; border: none; color: var(--dim);
  font-size: 14px; cursor: pointer; padding: 0 2px; line-height: 1;
  flex-shrink: 0;
}

.compose-bar {
  flex-shrink: 0;
  height: 40px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 8px;
}
.compose-open-btn {
  flex: 1; height: 28px;
  background: var(--surface); border: 1px solid var(--border); border-radius: 14px;
  color: var(--dim); font-size: 12px; cursor: pointer;
  text-align: left; padding: 0 12px;
}

/* ── DOM Keyboard ── */
#compose-display {
  flex-shrink: 0;
  height: 46px;
  background: var(--surface);
  margin: 3px 8px 3px;
  border-radius: 6px;
  padding: 5px 8px;
  font-size: 12px;
  line-height: 1.4;
  overflow-y: auto;
  word-break: break-word;
  color: var(--text);
  border: 1px solid var(--border);
}
#compose-display:empty::before { content: 'Type a message…'; color: var(--dim); }
#compose-display::after {
  content: '';
  display: inline-block;
  width: 1.5px;
  height: 0.85em;
  background: var(--accent);
  margin-left: 1px;
  vertical-align: -0.05em;
  animation: cursor-blink 1s step-end infinite;
}
@keyframes cursor-blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0; }
}

#compose-history {
  flex-shrink: 0;
  height: 70px;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 4px 8px;
  display: flex;
  flex-direction: column;
  gap: 3px;
  border-bottom: 1px solid var(--border);
}
#compose-history::-webkit-scrollbar { width: 2px; }
#compose-history::-webkit-scrollbar-thumb { background: var(--border); }
#compose-history .msg-row { pointer-events: none; }
#compose-history .msg-avatar,
#compose-history .msg-avatar-placeholder { display: none; }
#compose-history .message-bubble { font-size: 10px; padding: 3px 6px; }
#compose-history .message-time { font-size: 9px; }
#compose-history .message-author { font-size: 9px; }
#virtual-keyboard {
  flex: 1;
  display: flex;
  flex-direction: column;
  padding: 2px 4px 2px;
  gap: 2px;
  background: #111;
}
.kbd-row {
  flex: 1;
  display: flex;
  gap: 2px;
  justify-content: center;
}
.key {
  flex: 1;
  min-height: 26px;
  background: #2a2a2e;
  border: 1px solid #555;
  border-bottom: 2px solid #444;
  color: #fff;
  border-radius: 4px;
  font-size: 10px;
  font-weight: 500;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  touch-action: manipulation;
  user-select: none; -webkit-user-select: none;
}
.key:active { background: #555; }
.key.wide   { flex: 1.6; font-size: 9px; }
.key.space  { flex: 4; }
.key.action { background: #3a6abf; border-color: #2a4a9f; }
.key.action:active { background: #4a7acf; }
.key.shifted { background: #3a3a44; color: #aad4ff; }

.compose-actions {
  flex-shrink: 0;
  height: 40px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  padding: 0 8px;
  align-items: center;
}
.btn {
  flex: 1; height: 28px;
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 12px; cursor: pointer; font-family: inherit;
}
.btn-cancel { background: var(--surface); color: var(--dim); }
.btn-send   { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 700; }
.btn-send:disabled { opacity: 0.5; }

#loading-overlay {
  position: absolute; inset: 0;
  background: var(--bg);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 8px;
  z-index: 100;
}
#loading-overlay.hidden { display: none; }
#loading-text { font-size: 12px; color: var(--dim); }
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

#recording-indicator {
  position: absolute;
  top: 36px; left: 0; right: 0;
  height: 26px;
  background: rgba(200, 30, 30, 0.92);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; color: #fff; font-weight: 700;
  letter-spacing: 0.5px;
  z-index: 50;
  opacity: 0; pointer-events: none;
  transition: opacity 0.15s;
}
#recording-indicator.active { opacity: 1; }

#toast {
  position: absolute; bottom: 48px; left: 50%;
  transform: translateX(-50%);
  background: #333; color: var(--text);
  padding: 5px 12px; border-radius: 12px;
  font-size: 11px; white-space: nowrap;
  opacity: 0; pointer-events: none;
  transition: opacity 0.2s;
  z-index: 200;
}
#toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">

<!-- screen: guilds -->
<div id="screen-guilds" class="screen">
  <div class="header">
    <div class="header-title">Servers</div>
  </div>
  <div class="scroll-area" id="guild-list"></div>
</div>

<!-- screen: channels -->
<div id="screen-channels" class="screen">
  <div class="header">
    <button class="back-btn" id="channels-back-btn">&#8249;</button>
    <div class="header-title" id="server-name">Discord</div>
  </div>
  <div class="scroll-area" id="channel-list"></div>
</div>

<!-- screen: messages -->
<div id="screen-messages" class="screen">
  <div class="header">
    <button class="back-btn" id="back-btn">&#8249;</button>
    <div class="header-title" id="channel-title"></div>
  </div>
  <div id="message-list"></div>
  <div id="new-msg-banner">↓ New messages</div>
  <div id="reply-bar">
    <span id="reply-bar-text"></span>
    <button id="reply-cancel">×</button>
  </div>
  <div class="compose-bar">
    <button class="compose-open-btn" id="open-compose-btn">Type a message…</button>
  </div>
</div>

<!-- screen: compose -->
<div id="screen-compose" class="screen">
  <div class="header">
    <button class="back-btn" id="cancel-btn">&#8249;</button>
    <div class="header-title" id="compose-channel-name"></div>
    <button class="btn btn-send" id="send-btn" style="flex:0;padding:0 10px;height:26px;font-size:11px;">Send</button>
  </div>
  <div id="compose-history"></div>
  <div id="compose-display"></div>
  <div id="virtual-keyboard">
    <div class="kbd-row">
      <button class="key" data-k="q">q</button><button class="key" data-k="w">w</button><button class="key" data-k="e">e</button><button class="key" data-k="r">r</button><button class="key" data-k="t">t</button><button class="key" data-k="y">y</button><button class="key" data-k="u">u</button><button class="key" data-k="i">i</button><button class="key" data-k="o">o</button><button class="key" data-k="p">p</button>
    </div>
    <div class="kbd-row" style="padding:0 5px">
      <button class="key" data-k="a">a</button><button class="key" data-k="s">s</button><button class="key" data-k="d">d</button><button class="key" data-k="f">f</button><button class="key" data-k="g">g</button><button class="key" data-k="h">h</button><button class="key" data-k="j">j</button><button class="key" data-k="k">k</button><button class="key" data-k="l">l</button>
    </div>
    <div class="kbd-row">
      <button class="key wide" id="kbd-shift">&#8679;</button>
      <button class="key" data-k="z">z</button><button class="key" data-k="x">x</button><button class="key" data-k="c">c</button><button class="key" data-k="v">v</button><button class="key" data-k="b">b</button><button class="key" data-k="n">n</button><button class="key" data-k="m">m</button>
      <button class="key wide" id="kbd-back">&#9003;</button>
    </div>
    <div class="kbd-row">
      <button class="key wide" id="kbd-sym">?123</button>
      <button class="key" data-k=",">,</button>
      <button class="key space" id="kbd-space">space</button>
      <button class="key" data-k=".">.</button>
      <button class="key wide action" id="kbd-enter">&#9166;</button>
    </div>
  </div>
</div>

<!-- recording indicator -->
<div id="recording-indicator">&#9679; LISTENING</div>

<!-- loading overlay -->
<div id="loading-overlay">
  <div class="spinner"></div>
  <div id="loading-text">Connecting…</div>
</div>

<!-- toast -->
<div id="toast"></div>

</div><!-- #app -->

<script>
// ── 1. Config ─────────────────────────────────────────────────────────────────
const params   = new URLSearchParams(location.search);
const BACKEND  = (params.get('backend') || location.origin).replace(/\/$/, '');
const TOKEN    = params.get('token') || '';

// ── 2. State ──────────────────────────────────────────────────────────────────
let guilds           = [];
let currentGuild     = null;
let channels         = [];
let currentChannel   = null;
let messages         = [];
let selectedIdx      = 0;
let currentScreen    = '';
let ws               = null;
let isLandscape      = false;
let rotationPaused   = false;
let wsReconnectDelay = 1000;
let recognition      = null;
let isRecording      = false;
const unreadChannels = new Set();
let replyTarget      = null;

// ── 3. DOM refs ───────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const recIndicator  = $('recording-indicator');
const loadingEl     = $('loading-overlay');
const loadingTextEl = $('loading-text');
const toastEl       = $('toast');
const guildListEl   = $('guild-list');
const channelListEl = $('channel-list');
const messageListEl = $('message-list');
const newMsgBanner  = $('new-msg-banner');
const composeDisplay = $('compose-display');

// ── R1 native STT bridge ──────────────────────────────────────────────────────
window.onPluginMessage = function(data) {
  if (!data || typeof data !== 'object') return;
  if (data.type === 'sttEnded') {
    isRecording = false;
    recIndicator.classList.remove('active');
    const text = (data.transcript || '').trim();
    if (text) { composeDisplay.textContent = text; showScreen('compose'); }
    else { showToast('No speech detected'); }
  }
};

// ── 4. showScreen ─────────────────────────────────────────────────────────────
function populateComposeHistory() {
  const el = document.getElementById('compose-history');
  if (!el || !messages.length) return;
  const recent = messages.slice(-8);
  el.innerHTML = recent.map((m, i) => bubbleHtml(m, recent[i - 1], i)).join('');
  el.scrollTop = el.scrollHeight;
}

function showScreen(name) {
  currentScreen = name;
  $('screen-guilds').classList.toggle('active',    name === 'guilds');
  $('screen-channels').classList.toggle('active',  name === 'channels');
  $('screen-messages').classList.toggle('active',  name === 'messages');
  $('screen-compose').classList.toggle('active',   name === 'compose');
  if (name === 'compose') populateComposeHistory();
}

// ── 5. Loading ────────────────────────────────────────────────────────────────
function showLoading(text) { loadingTextEl.textContent = text || 'Loading…'; loadingEl.classList.remove('hidden'); }
function hideLoading()     { loadingEl.classList.add('hidden'); }

// ── 6. Toast ──────────────────────────────────────────────────────────────────
let toastTimer = null;
function showToast(msg, duration) {
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), duration || 2000);
}

// ── 7. Helpers ────────────────────────────────────────────────────────────────
function relativeTime(tsMs) {
  const diff = Date.now() - tsMs;
  if (diff < 60000)    return 'just now';
  if (diff < 3600000)  return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return Math.floor(diff / 86400000) + 'd ago';
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function discordToHtml(text) {
  // Escape HTML first, then apply Discord markdown
  let s = escapeHtml(text);
  // Code blocks
  s = s.replace(/```(?:\w*\n)?([\s\S]*?)```/g,
    (_, c) => `<pre style="background:rgba(0,0,0,0.35);padding:3px 5px;border-radius:4px;font-size:10px;white-space:pre-wrap;margin:2px 0;">${c.trim()}</pre>`);
  // Inline code
  s = s.replace(/`([^`\n]+)`/g,
    '<code style="background:rgba(0,0,0,0.35);padding:1px 4px;border-radius:3px;font-size:10px;">$1</code>');
  // Bold italic
  s = s.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  // Bold
  s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Italic
  s = s.replace(/\*([^*\n]+)\*/g, '<em>$1</em>');
  s = s.replace(/_([^_\n]+)_/g, '<em>$1</em>');
  // Underline
  s = s.replace(/__(.+?)__/g, '<u>$1</u>');
  // Strikethrough
  s = s.replace(/~~(.+?)~~/g, '<s>$1</s>');
  // Spoiler
  s = s.replace(/\|\|(.+?)\|\|/g,
    '<span style="background:var(--border);color:transparent;border-radius:2px;padding:0 2px;" title="spoiler">$1</span>');
  // Blockquote
  s = s.replace(/^&gt; (.+)$/gm,
    '<div style="border-left:2px solid var(--dim);padding-left:5px;color:var(--dim);margin:1px 0;">$1</div>');
  // Line breaks
  s = s.replace(/\n/g, '<br>');
  return s;
}

// ── 8. api ────────────────────────────────────────────────────────────────────
async function api(path, opts) {
  const headers = { 'Content-Type': 'application/json' };
  if (TOKEN) headers['Authorization'] = 'Bearer ' + TOKEN;
  const res = await fetch(BACKEND + path, Object.assign({}, opts, { headers: Object.assign(headers, (opts && opts.headers) || {}) }));
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return res.json();
}

// ── 9. renderGuildList ────────────────────────────────────────────────────────
function renderGuildList() {
  guildListEl.innerHTML = guilds.map((g, i) => {
    const icon = g.iconURL
      ? `<img class="guild-icon" src="${escapeHtml(g.iconURL)}" loading="lazy">`
      : `<div class="guild-icon-placeholder">${escapeHtml(g.name[0].toUpperCase())}</div>`;
    return `<div class="guild-item${i === selectedIdx ? ' selected' : ''}" data-idx="${i}">${icon}<div class="guild-name">${escapeHtml(g.name)}</div></div>`;
  }).join('');
  const sel = guildListEl.querySelector('.selected');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

// ── 10. renderChannelList ─────────────────────────────────────────────────────
function renderChannelList() {
  let html = '', lastCat = null;
  channels.forEach(function(ch, i) {
    if (ch.category !== lastCat) {
      html += '<div class="category-header">' + escapeHtml(ch.category) + '</div>';
      lastCat = ch.category;
    }
    const dot = unreadChannels.has(ch.id) ? '<span class="unread-dot"></span>' : '';
    html += '<div class="channel-item' + (i === selectedIdx ? ' selected' : '') + '" data-idx="' + i + '"><span class="channel-item-name">' + escapeHtml(ch.name) + '</span>' + dot + '</div>';
  });
  channelListEl.innerHTML = html;
  const sel = channelListEl.querySelector('.selected');
  if (sel) sel.scrollIntoView({ block: 'nearest' });
}

// ── 11. renderMessages ────────────────────────────────────────────────────────
function setReplyTarget(msg) {
  replyTarget = msg;
  const bar = document.getElementById('reply-bar');
  const txt = document.getElementById('reply-bar-text');
  if (msg) {
    txt.innerHTML = `↩ <strong>${escapeHtml(msg.author)}</strong>: ${escapeHtml((msg.content || '[attachment]').slice(0, 60))}`;
    bar.classList.add('active');
  } else {
    bar.classList.remove('active');
  }
}

function renderMessages() {
  messageListEl.innerHTML = messages.map((m, i) => bubbleHtml(m, messages[i - 1], i)).join('');
  scrollToBottom();
}

function avatarHtml(m) {
  if (m.avatarURL) return `<img class="msg-avatar" src="${escapeHtml(m.avatarURL)}" loading="lazy">`;
  return `<div class="msg-avatar-placeholder">${escapeHtml((m.author || '?')[0].toUpperCase())}</div>`;
}

function bubbleHtml(m, prev, idx) {
  if (m.isSystem) {
    return `<div class="system-msg">${escapeHtml(m.systemContent || '')}</div>`;
  }
  const grouped = !m.isOwn && prev && !prev.isSystem && prev.authorId === m.authorId && !m.replyTo;
  const textBody = m.hasAudio ? '🎤 Voice message' : discordToHtml(m.content || '');
  const hasImgs  = (m.images || []).length > 0;
  const imgs = (m.images || []).map(url =>
    `<img src="${escapeHtml(url)}" style="max-width:100%;border-radius:5px;margin-top:3px;display:block;" loading="lazy">`
  ).join('');
  const embedsHtml = (m.embeds || []).map(e => {
    const parts = [];
    if (e.title) parts.push(`<div style="font-weight:700;font-size:11px">${escapeHtml(e.title)}</div>`);
    if (e.description) parts.push(`<div style="font-size:11px;color:var(--dim)">${discordToHtml(e.description)}</div>`);
    return `<div style="border-left:3px solid var(--accent);padding:3px 6px;margin-top:3px;background:rgba(74,158,255,0.08)">${parts.join('')}</div>`;
  }).join('');
  const replyHtml = m.replyTo
    ? `<div class="msg-reply"><span class="msg-reply-author">${escapeHtml(m.replyTo.author)}</span>${escapeHtml(m.replyTo.content)}</div>`
    : '';
  const reactHtml = (m.reactions || []).length
    ? `<div class="msg-reactions">${m.reactions.map(r => `<span class="msg-reaction">${escapeHtml(r.emoji)} ${r.count}</span>`).join('')}</div>`
    : '';
  const mentionClass = m.mentionsMe ? ' mention' : '';
  const bubble = `<div class="message-bubble${m.isOwn ? ' own' : ''}${hasImgs ? ' has-photo' : ''}${mentionClass}">`
    + replyHtml
    + (!m.isOwn && !grouped ? `<div class="message-author">${escapeHtml(m.author)}</div>` : '')
    + (textBody ? `<div>${textBody}</div>` : '')
    + embedsHtml
    + imgs
    + reactHtml
    + `<div class="message-time">${relativeTime(m.timestamp)}</div></div>`;
  const di = idx !== undefined ? ` data-idx="${idx}"` : '';
  if (m.isOwn) return `<div class="msg-row own"${di}>${bubble}</div>`;
  if (grouped) return `<div class="msg-row grouped"${di}>${bubble}</div>`;
  return `<div class="msg-row"${di}>${avatarHtml(m)}${bubble}</div>`;
}

function appendMessage(msg) {
  const near = isNearBottom();
  const prev = messages[messages.length - 1];
  const idx  = messages.length;
  const wrap = document.createElement('div');
  wrap.innerHTML = bubbleHtml(msg, prev, idx);
  messageListEl.appendChild(wrap.firstElementChild);
  if (near) {
    scrollToBottom();
  } else {
    newMsgBanner.style.display = 'block';
  }
}

function isNearBottom() {
  return messageListEl.scrollHeight - messageListEl.scrollTop - messageListEl.clientHeight < 60;
}

function scrollToBottom() {
  messageListEl.scrollTop = messageListEl.scrollHeight;
  newMsgBanner.style.display = 'none';
}

// ── 12. loadGuilds ────────────────────────────────────────────────────────────
async function loadGuilds() {
  showLoading('Loading servers…');
  try {
    guilds = await api('/guilds');
    selectedIdx = 0;
    renderGuildList();
    // If only one guild, skip the picker and go straight to channels
    if (guilds.length === 1) {
      await openGuild(guilds[0]);
      return;
    }
    showScreen('guilds');
  } catch (e) {
    showToast('Failed to load servers');
    showScreen('guilds');
  } finally {
    hideLoading();
  }
}

// ── 13. openGuild ─────────────────────────────────────────────────────────────
async function openGuild(g) {
  currentGuild = g;
  $('server-name').textContent = g.name;
  showLoading('Loading channels…');
  try {
    channels = await api('/channels?guild=' + g.id);
    selectedIdx = 0;
    renderChannelList();
    showScreen('channels');
  } catch (e) {
    showToast('Failed to load channels');
  } finally {
    hideLoading();
  }
}

// ── 14. openChannel ───────────────────────────────────────────────────────────
async function openChannel(ch) {
  currentChannel = ch;
  unreadChannels.delete(ch.id);
  newMsgBanner.style.display = 'none';
  setReplyTarget(null);
  $('channel-title').textContent = '#' + ch.name;
  $('compose-channel-name').textContent = '#' + ch.name;
  showScreen('messages');
  showLoading('Loading…');
  try {
    messages = await api('/channels/' + ch.id + '/messages?limit=30');
    renderMessages();
  } catch (e) {
    showToast('Failed to load messages');
  } finally {
    hideLoading();
  }
}

// ── 15. sendMessage ───────────────────────────────────────────────────────────
async function sendMessage() {
  const content = composeDisplay.textContent.trim();
  if (!content || !currentChannel) return;
  const sendBtn = $('send-btn');
  sendBtn.disabled = true;
  try {
    const result = await api('/channels/' + currentChannel.id + '/send', {
      method: 'POST',
      body: JSON.stringify({ content, replyTo: replyTarget?.id || null }),
    });
    setReplyTarget(null);
    composeDisplay.textContent = '';
    showScreen('messages');
    appendMessage(result.message);
  } catch (e) {
    showToast('Send failed');
  } finally {
    sendBtn.disabled = false;
  }
}

// ── 16. connectWS ─────────────────────────────────────────────────────────────
function connectWS() {
  const proto = BACKEND.startsWith('https') ? 'wss' : 'ws';
  const host  = BACKEND.replace(/^https?:\/\//, '');
  const url   = proto + '://' + host + '/ws' + (TOKEN ? '?token=' + TOKEN : '');
  ws = new WebSocket(url);
  ws.onopen = function() { wsReconnectDelay = 1000; };
  ws.onmessage = function(e) {
    try {
      const data = JSON.parse(e.data);
      if (data.type === 'new_message') {
        if (currentChannel && data.channelId === currentChannel.id) {
          if (data.message.isOwn) return;
          messages.push(data.message);
          appendMessage(data.message);
        } else {
          unreadChannels.add(data.channelId);
          if (currentScreen === 'channels') renderChannelList();
        }
      }
    } catch (err) {}
  };
  ws.onclose = function() { setTimeout(connectWS, wsReconnectDelay); wsReconnectDelay = Math.min(wsReconnectDelay * 2, 30000); };
  ws.onerror = function() { ws.close(); };
}

// ── 17. Voice ─────────────────────────────────────────────────────────────────
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = true; r.interimResults = false; r.lang = 'en-US';
  let pending = '';
  r.onresult = function(e) {
    for (let i = e.resultIndex; i < e.results.length; i++) {
      if (e.results[i].isFinal) pending += e.results[i][0].transcript;
    }
  };
  r.onerror = function(e) { if (e.error !== 'no-speech') { stopListening(); showToast('Voice error'); } };
  r.onend   = function()  { if (isRecording) { try { r.start(); } catch (err) {} } };
  r._getPending = function() { return pending; };
  return r;
}

function startListening() {
  if (!currentChannel || isRecording) return;
  if (typeof CreationVoiceHandler !== 'undefined') {
    isRecording = true; recIndicator.classList.add('active');
    CreationVoiceHandler.postMessage('start'); return;
  }
  if (!recognition) recognition = initRecognition();
  if (!recognition) { showToast('STT not supported'); return; }
  try { recognition.start(); isRecording = true; recIndicator.classList.add('active'); }
  catch (e) { showToast('Mic unavailable'); }
}

function stopListening() {
  if (!isRecording) return;
  if (typeof CreationVoiceHandler !== 'undefined') { CreationVoiceHandler.postMessage('stop'); return; }
  isRecording = false; recIndicator.classList.remove('active');
  const text = recognition ? recognition._getPending().trim() : '';
  try { if (recognition) recognition.stop(); } catch (e) {}
  if (text) { composeDisplay.textContent = text; showScreen('compose'); }
  else { showToast('No speech detected'); }
}

// ── 18. Scroll ────────────────────────────────────────────────────────────────
function doScrollUp() {
  if (currentScreen === 'compose') return;
  if (currentScreen === 'guilds') {
    if (selectedIdx > 0) { selectedIdx--; renderGuildList(); }
  } else if (currentScreen === 'channels') {
    if (selectedIdx > 0) { selectedIdx--; renderChannelList(); }
  } else if (currentScreen === 'messages') {
    messageListEl.scrollBy(0, -60);
  }
}
function doScrollDown() {
  if (currentScreen === 'compose') return;
  if (currentScreen === 'guilds') {
    if (selectedIdx < guilds.length - 1) { selectedIdx++; renderGuildList(); }
  } else if (currentScreen === 'channels') {
    if (selectedIdx < channels.length - 1) { selectedIdx++; renderChannelList(); }
  } else if (currentScreen === 'messages') {
    messageListEl.scrollBy(0, 60);
  }
}
// Inverted portrait feel + landscape compensation cancels out — both modes: scrollUp=down, scrollDown=up
window.addEventListener('scrollUp',   () => doScrollDown());
window.addEventListener('scrollDown', () => doScrollUp());

// ── 19. Side button (single click = select, long press = PTT) ─────────────────
let sideClickTimer = null;
window.addEventListener('sideClick', function() {
  // Hardware fires two sideClick events ~50ms apart — debounce
  if (sideClickTimer) return;
  sideClickTimer = setTimeout(function() { sideClickTimer = null; }, 150);
  if (currentScreen === 'compose') return;
  if (currentScreen === 'guilds' && guilds[selectedIdx]) openGuild(guilds[selectedIdx]);
  else if (currentScreen === 'channels' && channels[selectedIdx]) openChannel(channels[selectedIdx]);
});
window.addEventListener('longPressStart', function() {
  if (currentScreen === 'messages') startListening();
});
window.addEventListener('longPressEnd', function() {
  if (currentScreen === 'messages' && isRecording) stopListening();
});

// ── 20. Keyboard ──────────────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  if (currentScreen === 'compose') return;
  if (e.key === 'Enter') { e.preventDefault(); window.dispatchEvent(new Event('sideClick')); }
  if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); window.dispatchEvent(new Event('longPressStart')); }
});
document.addEventListener('keyup', function(e) {
  if (currentScreen === 'compose') return;
  if (e.key === ' ' || e.code === 'Space') { e.preventDefault(); window.dispatchEvent(new Event('longPressEnd')); }
});

// ── 21. DOM Keyboard logic ────────────────────────────────────────────────────
(function() {
  let shifted = false;
  let symMode = false;

  const letters = [
    ['q','w','e','r','t','y','u','i','o','p'],
    ['a','s','d','f','g','h','j','k','l'],
    ['z','x','c','v','b','n','m']
  ];
  const symbols = [
    ['1','2','3','4','5','6','7','8','9','0'],
    ['-','/',':',';','(',')','$','&','@','"'],
    ['.',',','?','!','\'']
  ];

  function applyShift() {
    const keys = document.querySelectorAll('.key[data-k]');
    keys.forEach(k => {
      const v = k.dataset.k;
      if (v.length === 1 && v >= 'a' && v <= 'z') {
        k.textContent = shifted ? v.toUpperCase() : v;
      }
    });
    const shiftBtn = document.getElementById('kbd-shift');
    if (shiftBtn) shiftBtn.classList.toggle('shifted', shifted);
  }

  function applySymMode() {
    const rows = [0, 1, 2];
    const allRows = document.querySelectorAll('.kbd-row');
    const symBtn = document.getElementById('kbd-sym');
    if (symMode) {
      // rows 0-2 get symbol sets
      [0, 1, 2].forEach(r => {
        const row = allRows[r];
        if (!row) return;
        const keys = row.querySelectorAll('.key[data-k]');
        keys.forEach((k, i) => {
          const sym = (symbols[r] || [])[i];
          if (sym !== undefined) { k.dataset.k = sym; k.textContent = sym; }
        });
      });
      if (symBtn) symBtn.textContent = 'ABC';
    } else {
      [0, 1, 2].forEach(r => {
        const row = allRows[r];
        if (!row) return;
        const keys = row.querySelectorAll('.key[data-k]');
        keys.forEach((k, i) => {
          const l = (letters[r] || [])[i];
          if (l !== undefined) { k.dataset.k = l; k.textContent = shifted ? l.toUpperCase() : l; }
        });
      });
      if (symBtn) symBtn.textContent = '?123';
    }
  }

  document.getElementById('virtual-keyboard').addEventListener('click', function(e) {
    const key = e.target.closest('.key');
    if (!key) return;
    const id = key.id, v = key.dataset.k;

    if (id === 'kbd-shift') {
      shifted = !shifted; symMode = false; applyShift();
    } else if (id === 'kbd-sym') {
      symMode = !symMode; applySymMode();
    } else if (id === 'kbd-back') {
      const d = composeDisplay;
      if (d.textContent.length) d.textContent = d.textContent.slice(0, -1);
    } else if (id === 'kbd-space') {
      composeDisplay.textContent += ' ';
    } else if (id === 'kbd-enter') {
      sendMessage();
    } else if (v) {
      const ch = (shifted && !symMode) ? v.toUpperCase() : v;
      composeDisplay.textContent += ch;
      if (shifted && !symMode) { shifted = false; applyShift(); }
    }
  });
})();

// ── 21b. Button/click handlers ────────────────────────────────────────────────
newMsgBanner.addEventListener('click', function() { scrollToBottom(); });
document.getElementById('reply-cancel').addEventListener('click', function() { setReplyTarget(null); });
messageListEl.addEventListener('click', function(e) {
  const row = e.target.closest('.msg-row[data-idx]');
  if (!row) return;
  const idx = parseInt(row.dataset.idx, 10);
  if (!isNaN(idx) && messages[idx]) setReplyTarget(messages[idx]);
});
messageListEl.addEventListener('scroll', function() {
  if (isNearBottom()) newMsgBanner.style.display = 'none';
});
$('channels-back-btn').addEventListener('click', function() { showScreen('guilds'); });
$('back-btn').addEventListener('click', function() { showScreen('channels'); });
$('open-compose-btn').addEventListener('click', function() { if (!currentChannel) return; showScreen('compose'); });
$('cancel-btn').addEventListener('click', function() { composeDisplay.textContent = ''; showScreen('messages'); });
$('send-btn').addEventListener('click', function() { sendMessage(); });

guildListEl.addEventListener('click', function(e) {
  const item = e.target.closest('.guild-item');
  if (!item) return;
  const idx = parseInt(item.dataset.idx, 10);
  if (!isNaN(idx) && guilds[idx]) { selectedIdx = idx; openGuild(guilds[idx]); }
});

channelListEl.addEventListener('click', function(e) {
  const item = e.target.closest('.channel-item');
  if (!item) return;
  const idx = parseInt(item.dataset.idx, 10);
  if (!isNaN(idx) && channels[idx]) { selectedIdx = idx; openChannel(channels[idx]); }
});

// ── 22. Landscape rotation ────────────────────────────────────────────────────
const _appEl = document.getElementById('app');
let _usingOsRotation = false;

async function setLandscape(on) {
  if (on === isLandscape) return;
  isLandscape = on;

  // Try OS-level orientation lock (keyboard follows automatically)
  if (screen.orientation && typeof screen.orientation.lock === 'function') {
    try {
      if (on) {
        await screen.orientation.lock('landscape-secondary');
      } else {
        await screen.orientation.lock('portrait-primary');
      }
      _usingOsRotation = true;
      // No CSS needed — OS handles it
      return;
    } catch (e) {
      _usingOsRotation = false;
    }
  }

  // CSS fallback
  _appEl.classList.toggle('landscape', on);
  document.body.classList.toggle('in-landscape', on);
}

(async function() {
  function onTilt(ax) {
    if (rotationPaused) return;
    if (!isLandscape && ax > 7) setLandscape(true);
    else if (isLandscape && ax < 4) setLandscape(false);
  }

  if (typeof window.creationSensors !== 'undefined') {
    try {
      const available = await window.creationSensors.accelerometer.isAvailable();
      if (available) {
        const cb = function(data) {
          const ax = Math.abs(data.x || 0);
          if (rotationPaused) return;
          if (!isLandscape && ax > 0.7) setLandscape(true);
          else if (isLandscape && ax < 0.4) setLandscape(false);
        };
        window.creationSensors.accelerometer.start(cb, { frequency: 10 });
        document.addEventListener('visibilitychange', function() {
          if (document.hidden) window.creationSensors.accelerometer.stop();
          else window.creationSensors.accelerometer.start(cb, { frequency: 10 });
        });
        return;
      }
    } catch(e) {}
  }

  if (typeof DeviceMotionEvent !== 'undefined') {
    window.addEventListener('devicemotion', function(e) {
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      onTilt(Math.abs(a.x || 0));
    });
  }
})();

// ── 23. Landscape touch-scroll remapping ──────────────────────────────────────
(function() {
  let touchStartX = 0;

  function activeScrollArea() {
    const s = document.querySelector('.screen.active');
    if (!s) return null;
    return s.querySelector('.scroll-area') || document.getElementById('message-list');
  }

  document.addEventListener('touchstart', function(e) {
    touchStartX = e.touches[0].clientX;
  }, { passive: true });

  document.addEventListener('touchmove', function(e) {
    if (!isLandscape) return;
    const sa = activeScrollArea();
    if (!sa) return;
    e.preventDefault();
    const dx = e.touches[0].clientX - touchStartX;
    sa.scrollTop -= dx * 1.5;
    touchStartX = e.touches[0].clientX;
  }, { passive: false });
})();

// ── 24. Init ──────────────────────────────────────────────────────────────────
(async function init() {
  await loadGuilds();
  connectWS();
})();
</script>
